spring.application.name=abertamente_cms

# Habilitar RFC 7807 / 9457 (Problem Details) nativo para todos os erros HTTP
spring.mvc.problemdetails.enabled=true

# Banco de Dados (variáveis providas pelo .env ou docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate JPA e Flyway Config
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Settings
jwt.secret=${JWT_SECRET:super_secret_default_key_that_is_at_least_256_bits_long_for_security_reasons_12345}
jwt.expirationMs=${JWT_EXPIRATION_MS:900000}
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mailpit Configuração
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Redis Cache
spring.data.redis.url=${SPRING_DATA_REDIS_URL}

# Sentry
sentry.dsn=${SENTRY_DSN}
sentry.send-default-pii=true
sentry.debug=true
# Habilita o Performance Monitoring (1.0 = 100% das requisições são rastreadas)
sentry.traces-sample-rate=1.0
