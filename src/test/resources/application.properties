spring.application.name=abertamente_cms

# Habilitar RFC 7807 / 9457 (Problem Details) nativo para todos os erros HTTP
spring.mvc.problemdetails.enabled=true

# Test Profile - Use H2 in-memory DB
spring.profiles.active=test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=

# Hibernate JPA Config
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway disabled for tests
spring.flyway.enabled=true

# JWT Settings (defaults for tests)
jwt.secret=${JWT_SECRET:testsecret}
jwt.expirationMs=${JWT_EXPIRATION_MS:900000}
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Mailpit Configuração (dummy)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
