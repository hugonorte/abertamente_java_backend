version: '3.8'

services:
  app:
    image: eclipse-temurin:21-jdk-alpine
    container_name: abertamente_java_app
    working_dir: /app
    volumes:
      - .:/app
      - gradle_cache:/root/.gradle
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/abertamente_cms
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    command: ["./gradlew", "bootRun"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: abertamente_postgres
    environment:
      - POSTGRES_DB=abertamente_cms
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: abertamente_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
volumes:
  postgres_data:
  gradle_cache:
